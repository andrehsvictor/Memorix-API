spring.profiles.active=dev
spring.config.import=optional:file:.env[.properties]
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

memorix.rsa.public.key.path=${RSA_PUBLIC_KEY_PATH:file:./keys/public.key}
memorix.rsa.private.key.path=${RSA_PRIVATE_KEY_PATH:file:./keys/private.key}
memorix.jwt.access.token.expiry=${ACCESS_TOKEN_EXPIRY:15m}
memorix.jwt.refresh.token.expiry=${REFRESH_TOKEN_EXPIRY:30d}
memorix.cors.allowed.origins=${CORS_ALLOWED_ORIGINS:*}