<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body>
    <div>
        <p>Dear {{name}},</p>
        <p>Click the link below to proceed with resetting your password.</p>
        <a href="{{resetUrl}}">
            <button
                style='background-color: #343dff; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;'>
                Reset Password
            </button>
        </a>
        <p>If you did not request a password reset, please ignore this e-mail.</p>
</body>

</html>
