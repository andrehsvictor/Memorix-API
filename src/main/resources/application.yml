spring:
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:${DB_TYPE}://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

memorix:
  security:
    jwt:
      public-key-location: optional:file:${JWT_PUBLIC_KEY_LOCATION}
      private-key-location: optional:file:${JWT_PRIVATE_KEY_LOCATION}